<style>
.navbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  border-top: 4px solid #CCCCFF;
  border-bottom: 4px solid #CCCCFF;
  font-family: Poppins, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
.navbar-brand img {
  max-height: 70px;
  display: block;
}
.nav-toggle {
  display: none;
  flex-direction: column;
  gap: 5px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 10px;
}
.nav-toggle span {
  display: block;
  width: 24px;
  height: 2px;
  background: #333;
  border-radius: 2px;
}
.navbar ul {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
}
.navbar ul li a {
  display: block;
  padding: 18px 14px;
  text-decoration: none;
  font-size: 17px;
  color: #336699;
  transition: background-color 0.3s, color 0.3s;
}
.navbar ul li a:hover {
  background-color: #CCCCFF;
}
@media (max-width: 768px) {
  .nav-toggle { display: flex; }
  .navbar ul {
    display: none;
    flex-direction: column;
    width: 100%;
    position: absolute;
    top: 78px;
    left: 0;
    background: #fff;
    border-bottom: 2px solid #CCCCFF;
    z-index: 99;
  }
  .navbar ul.open { display: flex; }
  .navbar ul li a {
    padding: 14px 20px;
    border-bottom: 1px solid #eee;
  }
}
</style>

<nav class="navbar">
  <a class="navbar-brand" href="{{ '/' | relative_url }}">
    <img src="/assets/img/lab_logo.png" alt="Jardine Lab">
  </a>
  <button class="nav-toggle" aria-label="Toggle navigation"
          onclick="document.querySelector('.navbar ul').classList.toggle('open')">
    <span></span><span></span><span></span>
  </button>
  <ul id="nav-menu">
    <li><a href="{{ '/' | relative_url }}" onclick="document.getElementById('nav-menu').classList.remove('open')">Home</a></li>
    <li><a href="{{ '/team/' | relative_url }}" onclick="document.getElementById('nav-menu').classList.remove('open')">People</a></li>
    <li><a href="{{ '/values/' | relative_url }}" onclick="document.getElementById('nav-menu').classList.remove('open')">Values</a></li>
    <li><a href="{{ '/research/' | relative_url }}" onclick="document.getElementById('nav-menu').classList.remove('open')">Research</a></li>
    <li><a href="{{ '/publications/' | relative_url }}" onclick="document.getElementById('nav-menu').classList.remove('open')">Publications</a></li>
  </ul>
</nav>
